<!DOCTYPE html>
<html>
<head>
<title>Neon Cyber Battle</title>

<style>

body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #0f172a, #020617);
    color:#e0f7ff;
}

.header{
    background: linear-gradient(90deg, #00f5ff, #ff00c8);
    text-align:center;
    padding:20px;
    font-size:22px;
    letter-spacing:2px;
    text-shadow:0 0 10px #00f5ff;
}

.start-screen{
    text-align:center;
    padding:40px;
}

.battle-screen{
    display:none;
    background:#020617;
    padding:30px;
}

#battle:target{
    display:block;
}

#battle:target ~ .start-screen{
    display:none;
}

#start-btn{
    display:inline-block;
    padding:15px 30px;
    background: linear-gradient(45deg, #00f5ff, #ff00c8);
    color:black;
    text-decoration:none;
    border-radius:10px;
    font-weight:bold;
    box-shadow:0 0 20px #00f5ff;
    transition:0.3s;
}

#start-btn:hover{
    transform:scale(1.1);
    box-shadow:0 0 30px #ff00c8;
}

.hp-bar{
    height:20px;
    background: linear-gradient(90deg, #00ff88, #00ffaa);
    margin:10px 0;
    border-radius:10px;
    box-shadow:0 0 10px #00ff88;
}

.menu{
    background:#0f172a;
    padding:20px;
    width:260px;
    border-radius:12px;
    box-shadow:0 0 20px rgba(0,255,255,0.2);
}

button{
    background:#111827;
    color:#00f5ff;
    border:1px solid #00f5ff;
    padding:8px 15px;
    border-radius:6px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#00f5ff;
    color:black;
}

select{
    background:#111827;
    color:#00f5ff;
    border:1px solid #00f5ff;
    padding:5px;
    border-radius:5px;
}

img{
    border-radius:12px;
    box-shadow:0 0 15px rgba(0,255,255,0.3);
}

</style>
</head>

<body>

<section class="header">
<h1>⚡ NEON CYBER BATTLE ⚡</h1>
</section>

<section class="start-screen">
<img src="https://images.unsplash.com/photo-1462331940025-496dfbfc7564?auto=format&fit=crop&w=1200&q=80"
style="width:80%;" alt="space">

<br><br>

<a id="start-btn" href="#battle">ENTER BATTLE</a>
</section>

<section id="battle" class="battle-screen">

<h2>⚠ A CYBER PIRATE HAS BREACHED YOUR SYSTEM ⚠</h2>

<img src="https://images.unsplash.com/photo-1518364538800-6bae3c2ea0f2?auto=format&fit=crop&w=200&q=80"
alt="enemy">

<p>HP: 10 / 10</p>

<div class="hp-bar"></div>

<img src="https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?auto=format&fit=crop&w=200&q=80"
alt="player ship">

<div class="menu">
<ol>
<li><button>⚡ LASER STRIKE</button></li>
<li>
ITEM
<select>
<option>💊 MED KIT</option>
<option>🛡 SHIELD</option>
</select>
</li>
<li><button>🔁 SWITCH</button></li>
<li><button>🏃 RETREAT</button></li>
</ol>
</div>

</section>

</body>
</html>
