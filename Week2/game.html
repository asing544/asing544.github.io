<!DOCTYPE html>
<html>
<head>
<title>Sports Battle Arena</title>

<style>

body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background:linear-gradient(to bottom, #0f5132, #031d14);
    color:white;
}

.header{
    background:#14532d;
    text-align:center;
    padding:20px;
    font-size:24px;
    font-weight:bold;
    letter-spacing:2px;
    border-bottom:4px solid #22c55e;
}

.start-screen{
    text-align:center;
    padding:40px;
}

.battle-screen{
    display:none;
    background:#022c22;
    padding:30px;
}

#battle:target{
    display:block;
}

#battle:target ~ .start-screen{
    display:none;
}

#start-btn{
    display:inline-block;
    padding:15px 30px;
    background:#22c55e;
    color:black;
    text-decoration:none;
    border-radius:8px;
    font-weight:bold;
    box-shadow:0 4px 10px rgba(0,0,0,0.4);
    transition:0.3s;
}

#start-btn:hover{
    background:#16a34a;
    transform:scale(1.1);
}

.hp-bar{
    height:20px;
    background:linear-gradient(to right, #22c55e, #4ade80);
    margin:10px 0;
    border-radius:10px;
    border:2px solid #14532d;
}

.menu{
    background:#14532d;
    padding:20px;
    width:260px;
    border-radius:10px;
    border:2px solid #22c55e;
}

button{
    background:#022c22;
    color:#4ade80;
    border:2px solid #22c55e;
    padding:8px 15px;
    border-radius:6px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#22c55e;
    color:black;
}

select{
    background:#022c22;
    color:#4ade80;
    border:2px solid #22c55e;
    padding:5px;
    border-radius:5px;
}

img{
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.5);
}

</style>
</head>

<body>

<section class="header">
<h1>🏟️ SPORTS ARENA SHOWDOWN 🏟️</h1>
</section>

<section class="start-screen">
<img src="https://images.unsplash.com/photo-1508098682722-e99c643e7f0b?auto=format&fit=crop&w=1200&q=80"
style="width:80%;" alt="stadium">

<br><br>

<a id="start-btn" href="#battle">START MATCH</a>
</section>

<section id="battle" class="battle-screen">

<h2>🔥 OPPONENT TEAM ENTERS THE FIELD 🔥</h2>

<img src="https://images.unsplash.com/photo-1521417531039-3c5e98e6fae9?auto=format&fit=crop&w=200&q=80"
alt="opponent">

<p>Stamina: 10 / 10</p>

<div class="hp-bar"></div>

<img src="https://images.unsplash.com/photo-1517649763962-0c623066013b?auto=format&fit=crop&w=200&q=80"
alt="player">

<div class="menu">
<ol>
<li><button>⚽ ATTACK</button></li>
<li>
GEAR
<select>
<option>💧 ENERGY DRINK</option>
<option>🛡 DEFENSE KIT</option>
</select>
</li>
<li><button>🔄 SUBSTITUTE</button></li>
<li><button>🏃 FORFEIT</button></li>
</ol>
</div>

</section>

</body>
</html>
