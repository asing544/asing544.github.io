<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interactive Page</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
            text-align: center;
            padding: 30px;
        }

        .button-group {
            margin: 20px;
        }

        .button-group button {
            padding: 12px 20px;
            margin: 10px;
            border: none;
            border-radius: 8px;
            background-color: #ff7eb3;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        .button-group button:hover {
            background-color: #ff4f81;
        }

        .link-group {
            margin: 20px;
        }

        .link-group a {
            display: inline-block;
            margin: 10px;
            padding: 10px 15px;
            background-color: #00c9a7;
            color: white;
            text-decoration: none;
            border-radius: 6px;
        }

        .link-group a:hover {
            background-color: #009f82;
        }

        img {
            margin-top: 20px;
            border-radius: 10px;
            width: 200px;
        }
    </style>
</head>

<body>

    <h1>✨ My Interactive Web Page ✨</h1>
    <p>Click buttons or explore links below!</p>

    <section class="button-group">
        <button id="one" onclick="alert('You clicked Button 1!')">Click Me 1</button>
        <button id="two" onclick="alert('You clicked Button 2!')">Click Me 2</button>
    </section>

    <div class="link-group">
        <a id="link1" href="https://www.google.com" target="_blank">Visit Google</a>
        <a id="link2" href="https://www.github.com" target="_blank">Visit GitHub</a>
    </div>

    <img src="https://via.placeholder.com/200" alt="Sample Image">

</body>
</html>
