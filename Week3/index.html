<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raccoon Card</title>

    <style>
        body {
            margin: 0;
            background-color: black;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 12px;
            font-family: Arial, sans-serif;
        }

        .card {
            width: 500px;
            height: 750px;
            background-color: #eeeeee;
            padding: 36px;
            border-radius: 12px;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.35);
            box-sizing: border-box;
        }

        .card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            margin-bottom: 12px;
            display: block;
        }

        .card h1 {
            font-family: "Trebuchet MS", Arial, sans-serif;
            font-size: 44px;
            color: black;
            margin-top: 30px;
            margin-bottom: 24px;
            font-weight: 700;
        }

        .card p {
            font-size: 20px;
            color: black;
            line-height: 1.3;
            margin-bottom: 18px;
        }

        .card ul {
            margin-top: 0;
            margin-bottom: 30px;
            padding-left: 48px;
            font-size: 18px;
            color: black;
            line-height: 1.4;
        }

        .card a {
            text-decoration: none;
        }

        .card button {
            background-color: black;
            color: white;
            border: none;
            padding: 8px 12px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        .card button:hover {
            background-color: #333333;
        }

        .card button:active {
            background-color: #555555;
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1516934024742-b461fba47600?auto=format&fit=crop&w=1200&q=80" alt="Group of raccoons">

        <h1>Wrath of the Raccoon</h1>

        <p>
            Summon up to 4 raccoons with 2d6 hp that can take the following actions on your turn:
        </p>

        <ul>
            <li>1d4 damage</li>
            <li>Can attempt to steal if within 10ft of a target</li>
            <li>Can inflict rabies</li>
        </ul>

        <a href="https://dnd.wizards.com/" target="_blank">
            <button>Wizards of the Coast, call me</button>
        </a>
    </div>

</body>
</html>
